---
# deploy_oled.yml
# Deploys the SSD1306 OLED system monitor to all Raspberry Pis
#
# Usage:
#   ansible-playbook -i inventory/hosts.ini deploy_oled.yml            # full install
#   ansible-playbook -i inventory/hosts.ini deploy_oled.yml --tags install  # packages + I2C + NTP
#   ansible-playbook -i inventory/hosts.ini deploy_oled.yml --tags deploy   # update script + restart
#   ansible-playbook -i inventory/hosts.ini deploy_oled.yml --tags off      # blank screen / stop service
#   ansible-playbook -i inventory/hosts.ini deploy_oled.yml --tags on       # restore screen / start service
#   ansible-playbook -i inventory/hosts.ini deploy_oled.yml --limit slot1_ubuntu_desktop_8gb  # single Pi only

- name: Deploy OLED System Monitor
  hosts: pis
  become: true

  vars:
    deploy_dir: /opt/oled_monitor
    script_name: oled_monitor.py
    service_name: oled-monitor
    python_bin: /usr/bin/python3

  tasks:

    # ── 1. System packages ───────────────────────────────────────────
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600
      tags: [install]

    - name: Install required system packages
      apt:
        name:
          - python3-pip
          - python3-pil
          - python3-smbus
          - i2c-tools
          - libjpeg-dev
          - fonts-dejavu-core
        state: present
      tags: [install]

    # ── 2. Enable I2C ────────────────────────────────────────────────
    - name: Enable I2C in /boot/firmware/config.txt
      lineinfile:
        path: /boot/firmware/config.txt
        regexp: '^#?dtparam=i2c_arm='
        line: 'dtparam=i2c_arm=on'
        backup: yes
      tags: [install]

    - name: Load i2c-dev kernel module now
      modprobe:
        name: i2c-dev
        state: present
      tags: [install]

    - name: Ensure i2c-dev loads on boot
      lineinfile:
        path: /etc/modules
        line: i2c-dev
        create: yes
      tags: [install]

    - name: Add super90 to i2c group
      user:
        name: super90
        groups: i2c
        append: yes
      ignore_errors: yes
      tags: [install]

    # ── 3. NTP time sync — all Pis to Dallas (America/Chicago) ────────
    - name: Install systemd-timesyncd
      apt:
        name: systemd-timesyncd
        state: present
      tags: [install]

    - name: Set timezone to America/Chicago (Dallas/Central)
      community.general.timezone:
        name: America/Chicago
      tags: [install]

    - name: Enable and start NTP sync
      systemd:
        name: systemd-timesyncd
        enabled: yes
        state: started
      tags: [install]

    - name: Force immediate NTP sync
      shell: timedatectl set-ntp true && timedatectl
      changed_when: false
      tags: [install]

    # ── 4. Python libraries ──────────────────────────────────────────
    - name: Install Python libraries via pip
      pip:
        name:
          - luma.oled
          - psutil
          - Pillow
        executable: pip3
        extra_args: --break-system-packages
      tags: [install]

    # ── 5. Deploy script ─────────────────────────────────────────────
    - name: Create deployment directory
      file:
        path: "{{ deploy_dir }}"
        state: directory
        owner: root
        group: root
        mode: '0755'
      tags: [deploy]

    - name: Copy OLED monitor script
      copy:
        src: playbooks/oled_monitor.py
        dest: "{{ deploy_dir }}/{{ script_name }}"
        owner: root
        group: root
        mode: '0755'
      notify: restart oled service
      tags: [deploy]

    # ── 6. Systemd service ───────────────────────────────────────────
    - name: Create systemd service unit
      copy:
        dest: /etc/systemd/system/{{ service_name }}.service
        content: |
          [Unit]
          Description=OLED System Monitor (SSD1306 128x64)
          After=network.target
          Wants=network-online.target

          [Service]
          ExecStart={{ python_bin }} {{ deploy_dir }}/{{ script_name }}
          WorkingDirectory={{ deploy_dir }}
          StandardOutput=journal
          StandardError=journal
          Restart=always
          RestartSec=10
          User=root

          [Install]
          WantedBy=multi-user.target
        mode: '0644'
      notify: restart oled service
      tags: [deploy]

    - name: Enable and start OLED service
      systemd:
        name: "{{ service_name }}"
        enabled: yes
        state: started
        daemon_reload: yes
      tags: [deploy]

    # ── 7. Verify ────────────────────────────────────────────────────
    - name: Check service is running
      shell: systemctl is-active {{ service_name }}
      register: service_status
      changed_when: false
      failed_when: false
      tags: [deploy]

    - name: Show service status per host
      debug:
        msg: "{{ inventory_hostname }} ({{ ansible_host }}) → oled-monitor: {{ service_status.stdout }}"
      tags: [deploy]

    # ── 8. Screen OFF — blank display and stop service ─────────────
    - name: Stop OLED service
      systemd:
        name: "{{ service_name }}"
        state: stopped
      ignore_errors: yes
      tags: [off]

    - name: Blank the OLED screen (send display-off command directly over I2C)
      shell: |
        {{ python_bin }} - << 'PYEOF'
        import smbus2, time

        # SSD1306 command bytes
        SSD1306_DISPLAYOFF       = 0xAE  # powers off all pixels
        SSD1306_CHARGEPUMP       = 0x8D
        SSD1306_CHARGEPUMP_OFF   = 0x10  # disable charge pump (cuts power to panel)

        for addr in [0x3C, 0x3D]:        # try both common addresses
            try:
                bus = smbus2.SMBus(1)
                # 0x00 = command mode for SSD1306
                bus.write_byte_data(addr, 0x00, SSD1306_CHARGEPUMP)
                time.sleep(0.01)
                bus.write_byte_data(addr, 0x00, SSD1306_CHARGEPUMP_OFF)
                time.sleep(0.01)
                bus.write_byte_data(addr, 0x00, SSD1306_DISPLAYOFF)
                bus.close()
                print(f"Display off sent to {hex(addr)}")
                break
            except Exception as e:
                pass
        PYEOF
      ignore_errors: yes
      tags: [off]

    - name: Confirm screen is off
      debug:
        msg: "{{ inventory_hostname }} — OLED screen blanked and service stopped"
      tags: [off]

    # ── 9. Screen ON — restart service, display resumes ──────────────
    - name: Start OLED service
      systemd:
        name: "{{ service_name }}"
        state: started
        daemon_reload: yes
      tags: [on]

    - name: Confirm screen is on
      debug:
        msg: "{{ inventory_hostname }} — OLED service started, display resuming"
      tags: [on]

  # ── Handlers ──────────────────────────────────────────────────────
  handlers:
    - name: restart oled service
      systemd:
        name: "{{ service_name }}"
        state: restarted
        daemon_reload: yes
